{% extends "base.html" %}
{% block title %}Sign Up · Stock Portfolio Diversification{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">Stock Portfolio Diversification</div>
    <h2>Create your account</h2>
    <p class="hint">Sign up to start analyzing your portfolio.</p>
    <form action="/signup" method="POST">
      <div class="field" style="margin-bottom: 16px;">
        <label for="name">Your name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Rahul Sharma" required />
      </div>
      <div class="field" style="margin-bottom: 16px;">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="field" style="margin-bottom: 24px;">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min 6 characters" required />
      </div>
      <button type="submit" class="btn btn--primary" style="width:100%;">Create account</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="/login">Log in here</a></p>
  </div>
</div>
{% endblock %}
