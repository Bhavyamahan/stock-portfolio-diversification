{% extends "base.html" %}
{% block title %}Login · Stock Portfolio Diversification{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">Stock Portfolio Diversification</div>
    <h2>Welcome back</h2>
    <p class="hint">Log in to access your portfolio analysis.</p>
    <form action="/login" method="POST">
      <div class="field" style="margin-bottom: 16px;">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="field" style="margin-bottom: 24px;">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" required />
      </div>
      <button type="submit" class="btn btn--primary" style="width:100%;">Log in</button>
    </form>
    <p class="auth-switch">Don't have an account? <a href="/signup">Sign up here</a></p>
  </div>
</div>
{% endblock %}
